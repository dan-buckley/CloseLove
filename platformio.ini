; CloseLove — Adafruit Feather 32u4 RFM69HCW proximity LEDs
; PlatformIO project configuration

[env:feather32u4]
platform  = atmelavr
board     = adafruit_feather32u4
framework = arduino

; RadioHead library for RFM69 radio
lib_deps =
    mikem/RadioHead @ ^1.120

; Serial monitor baud rate
monitor_speed = 115200

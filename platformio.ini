; CloseLove — Adafruit Feather 32u4 RFM69HCW proximity LEDs
; PlatformIO project configuration

[env:feather32u4]
platform  = atmelavr
board     = feather32u4
framework = arduino

; Libraries
lib_deps =
    mikem/RadioHead @ ^1.120          ; RFM69 radio driver
    adafruit/Adafruit NeoPixel @ ^1.12 ; WS2812B LED strip driver

; Serial monitor baud rate
monitor_speed = 115200

; Lock upload to the Feather's USB port (avoids accidentally hitting Bluetooth devices)
upload_port = /dev/cu.usbmodem*
